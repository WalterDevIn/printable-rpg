<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Printable RPG - Print Preview</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="app-toolbar" aria-label="Controles de impresión">
        <div>
          <p class="eyebrow">Printable RPG</p>
          <h1>Preview imprimible</h1>
          <p class="toolbar-description">Cartas generadas desde datos JS y una plantilla declarativa.</p>
        </div>
        <button id="printButton" class="print-button" type="button">Imprimir</button>
      </header>

      <section id="printJobInspector" class="inspector-stage" aria-label="Inspector no editable del print job"></section>

      <main class="preview-stage" aria-label="Vista previa de páginas A4">
        <div id="printPreview" class="print-preview"></div>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
